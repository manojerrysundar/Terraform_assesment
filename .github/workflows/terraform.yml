name: Terraform

# ─────────────────────────────────────────────────────────────────────────────
#  Triggers
#  • push to main        → runs Plan automatically
#  • workflow_dispatch   → manually run Apply or Destroy
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: true
        type: choice
        options:
          - apply
          - destroy

permissions:
  contents: read   # read-only — state is stored in S3, no git write needed

env:
  TF_VERSION: "1.9.8"
  AWS_REGION:  "ap-south-1"
  TF_STATE_BUCKET: "terraform-state-393229434298-ap-south-1"
  TF_STATE_KEY:    "ecs-platform/terraform.tfstate"

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Plan
  # Runs on every push to main AND before every manual apply/destroy.
  # Shows exactly what will be created / changed / destroyed.
  # ───────────────────────────────────────────────────────────────────────────
  plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.action == 'apply' || github.event.inputs.action == 'destroy'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # AWS credentials are stored as GitHub Secrets:
      #   Repo → Settings → Secrets and variables → Actions
      #   Required secrets:
      #     AWS_ACCESS_KEY_ID       ← IAM access key ID
      #     AWS_SECRET_ACCESS_KEY   ← IAM secret access key
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Init with S3 backend — state file lives in the S3 bucket, not in git
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        run: |
          if [ "${{ github.event.inputs.action }}" = "destroy" ]; then
            terraform plan -destroy -no-color -input=false
          else
            terraform plan -no-color -input=false
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Apply  (manual only + approval gate)
  #
  # HOW TO RUN:
  #   Actions → Terraform → Run workflow → action: apply → Run workflow
  #   → approve in the "Waiting for review" gate
  #
  # ONE-TIME SETUP:
  #   Repo → Settings → Environments → New environment → name: apply
  #   → Required reviewers → add yourself → Save protection rules
  # ───────────────────────────────────────────────────────────────────────────
  apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: plan
    if: github.event.inputs.action == 'apply'
    environment: apply

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      # State is automatically saved to S3 after apply — no git commit needed
      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

      - name: Show Outputs
        run: |
          echo ""
          echo "============================================"
          echo "  API endpoint:"
          terraform output alb_dns_name
          echo "============================================"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — Destroy  (manual only + approval gate)
  #
  # HOW TO RUN:
  #   Actions → Terraform → Run workflow → action: destroy → Run workflow
  #   → approve in the "Waiting for review" gate
  #
  # ONE-TIME SETUP:
  #   Repo → Settings → Environments → New environment → name: destroy
  #   → Required reviewers → add yourself → Save protection rules
  # ───────────────────────────────────────────────────────────────────────────
  destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    needs: plan
    if: github.event.inputs.action == 'destroy'
    environment: destroy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      # State is automatically updated in S3 after destroy — no git commit needed
      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false
